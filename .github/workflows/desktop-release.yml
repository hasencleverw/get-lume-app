name: Desktop release (Windows + Linux)

# Builds Lume installers for Linux (deb / rpm / AppImage) and Windows (msi / nsis)
# from the Tauri port in desktop/. Triggered by tags matching v* or manual dispatch.
# Artifacts are attached to a draft GitHub Release so they can be reviewed before
# publishing.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
            label: linux
          - platform: windows-2022
            args: ''
            label: windows

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            file \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund

      - name: Tauri build (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        env:
          NO_STRIP: 'true'
        run: npm run tauri:build

      - name: Tauri build (Windows)
        if: matrix.platform == 'windows-2022'
        run: npm run tauri:build

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/rpm/*.rpm
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-2022'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe

  release:
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: Lume ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/linux-installers/*
            artifacts/windows-installers/*
